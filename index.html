<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>SRT Translator Pro</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
  text-align: center;
  padding: 40px;
}
.box {
  border: 2px dashed #555;
  padding: 40px;
  border-radius: 10px;
}
button {
  padding: 10px 20px;
  margin: 10px;
}
textarea {
  width: 90%;
  height: 250px;
}
</style>
</head>

<body>

<h1>🔥 SRT Translator (WORKING)</h1>

<div class="box">
  <input type="file" id="fileInput" accept=".srt">
</div>

<button onclick="translateSRT()">Dịch Trung → Việt</button>
<button onclick="download()">Tải file</button>

<textarea id="output"></textarea>

<script>
let original = "";
let resultText = "";

// đọc file
fileInput.addEventListener("change", function(e) {
  const reader = new FileReader();
  reader.onload = e => {
    original = e.target.result;
    alert("Đã load file!");
  };
  reader.readAsText(e.target.files[0]);
});

// parse SRT
function parseSRT(data) {
  return data.split("\n\n").map(block => {
    const lines = block.split("\n");
    return {
      index: lines[0],
      time: lines[1],
      text: lines.slice(2).join(" ")
    };
  });
}

// fix xưng hô
function fix(text) {
  return text
    .replace(/ta/g, "tôi")
    .replace(/ngươi/g, "anh")
    .replace(/huynh/g, "anh")
    .replace(/đệ/g, "em");
}

// API MyMemory (FREE)
async function translateText(text) {
  try {
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=zh|vi`;
    const res = await fetch(url);
    const data = await res.json();
    return fix(data.responseData.translatedText);
  } catch {
    return text;
  }
}

// dịch SRT
async function translateSRT() {
  const blocks = parseSRT(original);
  let result = "";

  for (let b of blocks) {
    let vi = await translateText(b.text);
    result += `${b.index}\n${b.time}\n${vi}\n\n`;
  }

  resultText = result;
  document.getElementById("output").value = result;
}

// tải file
function download() {
  const blob = new Blob([resultText], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "translated.srt";
  a.click();
}
</script>

</body>
</html>
